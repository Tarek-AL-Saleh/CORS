version: '3.8'

services:
  db:
    image: postgres:15
    container_name: cors_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-cors_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: cors_api
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-cors_db}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cors_frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - api
    env_file:
      - ./frontend/.env

volumes:
  postgres_data:
